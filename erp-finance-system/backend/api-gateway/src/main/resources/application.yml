spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: auth-service
                fallbackUri: forward:/fallback/auth

        - id: finance-core-service
          uri: ${FINANCE_CORE_URL:http://finance-core-service:8084}
          predicates:
            - Path=/api/finance/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: finance-core-service
                fallbackUri: forward:/fallback/core

        - id: ap-service
          uri: ${AP_SERVICE_URL:http://ap-service:8086}
          predicates:
            - Path=/api/ap/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: ap-service
                fallbackUri: forward:/fallback/ap

        - id: ar-service
          uri: ${AR_SERVICE_URL:http://ar-service:8085}
          predicates:
            - Path=/api/ar/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: ar-service
                fallbackUri: forward:/fallback/ar

        - id: reporting-service
          uri: ${REPORTING_SERVICE_URL:http://reporting-service:8087}
          predicates:
            - Path=/api/reports/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: reporting-service
                fallbackUri: forward:/fallback/reports

      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter:
              replenishRate: 100
              burstCapacity: 200
            key-resolver: "#{@userKeyResolver}"
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - X-Total-Count
              - X-Page-Number
              - X-Page-Size
            allowCredentials: true

  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: 6379
    timeout: 60000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI:http://auth-service:8081/auth}
          jwk-set-uri: ${AUTH_JWK_URI:http://auth-service:8081/auth/.well-known/jwks.json}

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  jwt:
    secret: your-secret-key-here-change-in-production
    expiration: 86400000 # 24 hours
  cors:
    allowed-origins: http://localhost:4200,http://localhost:3000
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    exposed-headers: Authorization,X-Total-Count,X-Page-Number,X-Page-Size
    max-age: 3600
